name: GameHub CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Type Check and E2E Tests
    runs-on: ubuntu-latest
    env:
      CI: true
      E2E: true
      PASSWORD: "123"
      JWT_SECRET: "local-admin-secret"
      SKIP_ENV_VALIDATION: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: tests/playwright
        run: pnpm playwright install chromium --with-deps

      - name: Initialize SQLite database
        run: DATABASE_URL=file:./dev.db pnpm --filter @repo/db db:init

      - name: Seed GameHub products
        run: DATABASE_URL=file:./dev.db pnpm --filter @repo/db db:seed

      - name: Type check
        run: pnpm turbo check-types

      - name: Build apps
        run: pnpm turbo build

      - name: Customer E2E tests
        run: pnpm turbo test-1

      - name: Admin E2E tests
        run: pnpm turbo test-2

      - name: Backend/API E2E tests
        run: pnpm turbo test-3
